<?xml version="1.0" encoding="UTF-8"?>
<svg id="Layer_1" xmlns="http://www.w3.org/2000/svg" version="1.1" viewBox="0 0 360 116">
  <defs>
    <style>
      .st0 { font-family: Helvetica, Helvetica; font-size: 15.97px; letter-spacing: .22em; }
      .st0, .st1, .st2 { fill: #6ee7b7; }
      .st0, .st1, .st3 { isolation: isolate; }
      .st4 { stroke-width: 2.5px; }
      .st4, .st5 { fill: none; }
      .st4, .st5, .st6 { stroke: #6ee7b7; }
      .st4, .st6 { stroke-miterlimit: 4; }
      .st1 { font-size: 34.47px; }
      .st1, .st3 { font-family: Helvetica-Bold, Helvetica; font-weight: 700; }
      .st3 { fill: #f0f0f5; font-size: 44.24px; letter-spacing: -.01em; }
      .st5 { stroke-width: 1.5px; }
      .st6 { fill-opacity: 0; stroke-width: 1.5px; }

      /* ── diamond draw ── */
      .dia-o { stroke-dasharray:352; stroke-dashoffset:352; animation:dl 1.1s cubic-bezier(.4,0,.2,1) 0.2s forwards; }
      .dia-i { stroke-dasharray:232; stroke-dashoffset:232; animation:dl 0.9s cubic-bezier(.4,0,.2,1) 1.0s forwards; }
      @keyframes dl { to { stroke-dashoffset:0; } }

      /* ── S scale from center ── */
      .s-letter { opacity:0; animation:sgrow 0.5s cubic-bezier(.34,1.56,.64,1) 1.8s forwards; }
      @keyframes sgrow { from{opacity:1;transform:scale(0)} to{opacity:1;transform:scale(1)} }

      /* ── dots ── */
      .dot-fill    { opacity:0; animation:fi 0.3s ease 2.2s forwards, dp 2.5s ease-in-out 3s infinite; }
      .dot-outline { opacity:0; animation:fi 0.3s ease 2.3s forwards; }
      @keyframes fi { to { opacity:1; } }
      @keyframes dp { 0%,100%{r:5.74;opacity:1} 50%{r:7.5;opacity:0.5} }

      /* ── per-letter slide+fade from left ── */
      /* icon done at ~2.5s, text starts at 2.6s, each letter 0.06s apart */
      .l { opacity:0; transform:translateX(-18px); }
      @keyframes ltr { to { opacity:1; transform:translateX(0); } }

      /* "Sachintha" — 9 letters */
      .l0  { animation: ltr .35s cubic-bezier(.4,0,.2,1) 1.40s forwards; }
      .l1  { animation: ltr .35s cubic-bezier(.4,0,.2,1) 1.46s forwards; }
      .l2  { animation: ltr .35s cubic-bezier(.4,0,.2,1) 1.52s forwards; }
      .l3  { animation: ltr .35s cubic-bezier(.4,0,.2,1) 1.58s forwards; }
      .l4  { animation: ltr .35s cubic-bezier(.4,0,.2,1) 1.64s forwards; }
      .l5  { animation: ltr .35s cubic-bezier(.4,0,.2,1) 1.70s forwards; }
      .l6  { animation: ltr .35s cubic-bezier(.4,0,.2,1) 1.76s forwards; }
      .l7  { animation: ltr .35s cubic-bezier(.4,0,.2,1) 1.82s forwards; }
      .l8  { animation: ltr .35s cubic-bezier(.4,0,.2,1) 1.88s forwards; }

      /* "Designer | Developer" — 20 chars, starts after Sachintha */
      .r0  { animation: ltr .3s cubic-bezier(.4,0,.2,1) 1.95s forwards; }
      .r1  { animation: ltr .3s cubic-bezier(.4,0,.2,1) 2.00s forwards; }
      .r2  { animation: ltr .3s cubic-bezier(.4,0,.2,1) 2.05s forwards; }
      .r3  { animation: ltr .3s cubic-bezier(.4,0,.2,1) 2.10s forwards; }
      .r4  { animation: ltr .3s cubic-bezier(.4,0,.2,1) 2.15s forwards; }
      .r5  { animation: ltr .3s cubic-bezier(.4,0,.2,1) 2.20s forwards; }
      .r6  { animation: ltr .3s cubic-bezier(.4,0,.2,1) 2.25s forwards; }
      .r7  { animation: ltr .3s cubic-bezier(.4,0,.2,1) 2.30s forwards; }
      .r8  { animation: ltr .3s cubic-bezier(.4,0,.2,1) 2.35s forwards; }
      .r9  { animation: ltr .3s cubic-bezier(.4,0,.2,1) 2.40s forwards; }
      .r10 { animation: ltr .3s cubic-bezier(.4,0,.2,1) 2.45s forwards; }
      .r11 { animation: ltr .3s cubic-bezier(.4,0,.2,1) 2.50s forwards; }
      .r12 { animation: ltr .3s cubic-bezier(.4,0,.2,1) 2.55s forwards; }
      .r13 { animation: ltr .3s cubic-bezier(.4,0,.2,1) 2.60s forwards; }
      .r14 { animation: ltr .3s cubic-bezier(.4,0,.2,1) 2.65s forwards; }
      .r15 { animation: ltr .3s cubic-bezier(.4,0,.2,1) 2.70s forwards; }
      .r16 { animation: ltr .3s cubic-bezier(.4,0,.2,1) 2.75s forwards; }
      .r17 { animation: ltr .3s cubic-bezier(.4,0,.2,1) 2.80s forwards; }
      .r18 { animation: ltr .3s cubic-bezier(.4,0,.2,1) 2.85s forwards; }
      .r19 { animation: ltr .3s cubic-bezier(.4,0,.2,1) 2.90s forwards; }
    </style>
  </defs>

  <!-- ICON GROUP -->
  <g>
    <rect class="st4 dia-o" x="25.42" y="23.53" width="68.93" height="68.93" rx="4" ry="4"
          transform="translate(-23.47 59.33) rotate(-45)"/>
    <rect class="st6 dia-i" x="39.2" y="37.32" width="41.36" height="41.36" rx="3" ry="3"
          transform="translate(-23.47 59.33) rotate(-45)"/>
    <text class="st1 s-letter" x="59.88" y="57.99"
          text-anchor="middle" dominant-baseline="central"
          style="transform-origin:59.88px 57.99px;">S</text>
    <circle class="st2 dot-fill"    cx="92.05" cy="89.02" r="5.74"/>
    <circle class="st5 dot-outline"  cx="27.71" cy="28.13" r="3.45"/>
  </g>

  <!-- TEXT GROUP — per-letter tspan animation -->
  <g>
    <!-- "Sachintha" -->
    <text class="st3" transform="translate(129.16 60.36)">
      <tspan class="l l0">S</tspan><tspan class="l l1">a</tspan><tspan class="l l2">c</tspan><tspan class="l l3">h</tspan><tspan class="l l4">i</tspan><tspan class="l l5">n</tspan><tspan class="l l6">t</tspan><tspan class="l l7">h</tspan><tspan class="l l8">a</tspan>
    </text>
    <!-- "Designer | Developer" -->
    <text class="st0" transform="translate(130.97 83.7)">
      <tspan class="l r0">D</tspan><tspan class="l r1">e</tspan><tspan class="l r2">s</tspan><tspan class="l r3">i</tspan><tspan class="l r4">g</tspan><tspan class="l r5">n</tspan><tspan class="l r6">e</tspan><tspan class="l r7">r</tspan><tspan class="l r8"> </tspan><tspan class="l r9">|</tspan><tspan class="l r10"> </tspan><tspan class="l r11">D</tspan><tspan class="l r12">e</tspan><tspan class="l r13">v</tspan><tspan class="l r14">e</tspan><tspan class="l r15">l</tspan><tspan class="l r16">o</tspan><tspan class="l r17">p</tspan><tspan class="l r18">e</tspan><tspan class="l r19">r</tspan>
    </text>
  </g>
</svg>
